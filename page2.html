<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn With Me - Coming Soon</title>
    <style>
        :root {
            --primary-glow: rgba(0, 242, 254, 0.4);
            --neon-blue: #00f2fe;
            --neon-green: #00ff88;
        }

        /* Modern Dark Theme Base */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0f0f25 0%, #05050b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Moving Particle/Star Background Effect */
        .background-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            animation: moveBackground 60s linear infinite;
            opacity: 0.15;
            z-index: 1;
        }

        @keyframes moveBackground {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: 550px 1100px, 400px 760px; }
        }

        /* Glassmorphism Container Card */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 50px 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255,255,255,0.05);
            z-index: 10;
            max-width: 550px;
            width: 90%;
        }

        /* Required Title: Bold, 25px, with subtle text-glow */
        .status-text {
            font-size: 25px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
            color: #ff4b2b;
            text-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
            animation: titlePulse 2s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            from { text-shadow: 0 0 15px rgba(255, 75, 43, 0.5); transform: scale(1); }
            to { text-shadow: 0 0 25px rgba(255, 75, 43, 0.8); transform: scale(1.02); }
        }

        /* Unique Countdown Grid */
        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.005) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 20px 10px;
            border-radius: 20px;
            min-width: 90px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .time-box:hover {
            transform: translateY(-8px);
            border-color: var(--neon-blue);
            box-shadow: 0 12px 24px var(--primary-glow);
        }

        .time-box span {
            display: block;
        }

        .number {
            font-size: 38px;
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 12px var(--primary-glow);
            font-variant-numeric: tabular-nums;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #8a8a9e;
            margin-top: 6px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* Back Button Style */
        .back-btn {
            display: inline-block;
            color: #8a8a9e;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            border-bottom: 1px dashed rgba(138, 138, 158, 0.4);
            padding-bottom: 2px;
        }

        .back-btn:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>

    <!-- Visual Background Effect Layer -->
    <div class="background-effect"></div>

    <!-- Main Content Card -->
    <div class="container">
        <!-- Required State Text (Bold & Size 25) -->
        <div class="status-text">⚡ Will be in soon ⚡</div>

        <!-- Countdown Display Grid -->
        <div class="countdown-grid">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days ⏳</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours 🪐</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins 🛸</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs ⚡</span>
            </div>
        </div>

        <!-- Back link to homepage -->
        <a href="index.html" class="back-btn">← Go Back to Home</a>
    </div>

    <!-- Countdown Timer Logic Script -->
    <script>
        // STORAGE PERSISTENCE ENGINE: Keeps target sync locked during refresh routines
        function initializeTargetTimeline() {
            let existingTarget = localStorage.getItem('persistent_launch_stamp');
            
            if (!existingTarget) {
                // Calculate exactly 95 days into future coordinates from first visit initialization
                const timelineOffset = 95 * 24 * 60 * 60 * 1000;
                const freshTargetStamp = new Date().getTime() + timelineOffset;
                localStorage.setItem('persistent_launch_stamp', freshTargetStamp);
                return freshTargetStamp;
            }
            return parseInt(existingTarget, 10);
        }

        const targetDate = initializeTargetTimeline();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                clearInterval(timerInterval);
                document.querySelector(".countdown-grid").innerHTML = "<h2 style='color:var(--neon-green); font-size: 2rem;'>SYSTEM ONLINE</h2>";
                return;
            }

            // Time math calculations
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Print numbers safely into the boxes, adding leading zeros if needed
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Run calculation instantly, then update it every 1 second
        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>




<audio id="bg-music" loop autoplay muted>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="global-screen-glow"></div>

<div id="audio-click-overlay" class="audio-interaction-overlay">
  <div class="interaction-prompt">⚡ TAP ANYWHERE TO SYSTEM ACTIVATION ⚡</div>
</div>

<div class="audio-player-widget">
  <div class="visualizer-container playing" id="visualizer">
    <div class="glow-orb"></div>
    <div class="vfx-bars">
      <span class="bar3d"></span>
      <span class="bar3d"></span>
      <span class="bar3d"></span>
      <span class="bar3d"></span>
      <span class="bar3d"></span>
    </div>
  </div>
</div>

<style>
  :root {
    --neon-gold: #ffdf00;
    --neon-yellow: #e5b800;
    --amber-glow: rgba(255, 223, 0, 0.3);
    --panel-bg: rgba(10, 12, 18, 0.55);
    --glass-border: rgba(255, 223, 0, 0.15);
  }

  /* Full Screen Click Capturer for Audio Context Initiation */
  .audio-interaction-overlay {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(5, 5, 10, 0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 99999;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: opacity 0.6s ease, visibility 0.6s;
  }

  .interaction-prompt {
    font-family: monospace;
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--neon-gold);
    letter-spacing: 3px;
    text-shadow: 0 0 15px var(--amber-glow);
    animation: textPulse 1.5s infinite alternate;
  }

  /* Dynamic Global Edge Glow Overlay on All Sides */
  .global-screen-glow {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 9999;
    
    box-shadow: 
      inset 0 0 40px rgba(255, 223, 0, 0.2),
      inset 0 0 80px rgba(229, 184, 0, 0.1);
    
    animation: atmosphericPulse 3.5s ease-in-out infinite alternate;
  }

  /* Audio Player Widget */
  .audio-player-widget {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    padding: 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    z-index: 10000;
    
    transform: perspective(800px) rotateX(10deg) rotateY(-10deg);
    transform-style: preserve-3d;
    box-shadow: 
      -5px 5px 15px rgba(0, 0, 0, 0.6),
      0 0 30px rgba(255, 223, 0, 0.05),
      inset 0 1px 2px rgba(255, 255, 255, 0.1);
    transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .audio-player-widget:hover {
    background: rgba(20, 18, 12, 0.7);
    transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateY(-5px);
    box-shadow: 
      0 15px 35px rgba(0, 0, 0, 0.6),
      0 0 40px rgba(255, 223, 0, 0.25),
      inset 0 1px 2px rgba(255, 255, 255, 0.15);
  }

  .visualizer-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 14px;
    border: 1px solid rgba(255, 223, 0, 0.1);
    transform: translateZ(15px);
    overflow: hidden;
  }

  .glow-orb {
    position: absolute;
    width: 120%;
    height: 120%;
    background: radial-gradient(circle, rgba(255,223,0,0.3) 0%, rgba(229,184,0,0) 70%);
    opacity: 1;
    mix-blend-mode: screen;
    animation: pulseGlow 3s infinite alternate;
  }

  .vfx-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 20px;
    z-index: 2;
  }

  .bar3d {
    width: 3px;
    height: 30%;
    background: linear-gradient(to top, var(--neon-yellow), var(--neon-gold));
    border-radius: 2px;
    transform-origin: bottom;
    box-shadow: 0 0 8px var(--neon-gold);
    animation: vfxBounce 0.6s ease-in-out infinite alternate;
  }

  .bar3d:nth-child(1) { animation-delay: 0.1s; height: 75%; }
  .bar3d:nth-child(2) { animation-delay: 0.35s; height: 90%; }
  .bar3d:nth-child(3) { animation-delay: 0.2s; height: 60%; }
  .bar3d:nth-child(4) { animation-delay: 0.5s; height: 100%; }
  .bar3d:nth-child(5) { animation-delay: 0.15s; height: 40%; }

  /* Atmospheric Gold Pulse Animations */
  @keyframes atmosphericPulse {
    0% {
      box-shadow: 
        inset 0 0 30px rgba(255, 223, 0, 0.2),
        inset 0 0 60px rgba(229, 184, 0, 0.1);
    }
    100% {
      box-shadow: 
        inset 0 0 60px rgba(255, 223, 0, 0.45),
        inset 0 0 120px rgba(229, 184, 0, 0.25);
    }
  }

  @keyframes textPulse {
    from { opacity: 0.4; text-shadow: 0 0 5px var(--amber-glow); }
    to { opacity: 1; text-shadow: 0 0 20px var(--neon-gold); }
  }

  @keyframes vfxBounce {
    0% { transform: scaleY(0.25); filter: brightness(0.9); }
    100% { transform: scaleY(1.1); filter: brightness(1.2); }
  }

  @keyframes pulseGlow {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.3) rotate(180deg); }
  }
</style>

<script>
  const music = document.getElementById('bg-music');
  const overlay = document.getElementById('audio-click-overlay');

  window.addEventListener('DOMContentLoaded', () => {
    music.volume = 0.5;
    // Attempt auto play immediately (will buffer track in background)
    music.play().catch(() => {});
  });

  // Global screen tracking script to remove browser restrictions
  document.addEventListener('click', () => {
    if (music.muted) {
      music.muted = false; // Disables muted state safely
      music.play().catch(() => {});
      
      // Smoothly hide prompt layer
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.visibility = 'hidden';
      }, 600);
    }
  });
</script>

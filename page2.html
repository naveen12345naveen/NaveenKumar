<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn With Me - Coming Soon</title>
    <style>
        :root {
            --primary-glow: rgba(0, 242, 254, 0.4);
            --neon-blue: #00f2fe;
            --neon-green: #00ff88;
        }

        /* Modern Dark Theme Base */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0f0f25 0%, #05050b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Moving Particle/Star Background Effect */
        .background-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            animation: moveBackground 60s linear infinite;
            opacity: 0.15;
            z-index: 1;
        }

        @keyframes moveBackground {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: 550px 1100px, 400px 760px; }
        }

        /* Glassmorphism Container Card */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 50px 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255,255,255,0.05);
            z-index: 10;
            max-width: 550px;
            width: 90%;
        }

        /* Required Title: Bold, 25px, with subtle text-glow */
        .status-text {
            font-size: 25px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
            color: #ff4b2b;
            text-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
            animation: titlePulse 2s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            from { text-shadow: 0 0 15px rgba(255, 75, 43, 0.5); transform: scale(1); }
            to { text-shadow: 0 0 25px rgba(255, 75, 43, 0.8); transform: scale(1.02); }
        }

        /* Unique Countdown Grid */
        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.005) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 20px 10px;
            border-radius: 20px;
            min-width: 90px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .time-box:hover {
            transform: translateY(-8px);
            border-color: var(--neon-blue);
            box-shadow: 0 12px 24px var(--primary-glow);
        }

        .time-box span {
            display: block;
        }

        .number {
            font-size: 38px;
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 12px var(--primary-glow);
            font-variant-numeric: tabular-nums;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #8a8a9e;
            margin-top: 6px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* Back Button Style */
        .back-btn {
            display: inline-block;
            color: #8a8a9e;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            border-bottom: 1px dashed rgba(138, 138, 158, 0.4);
            padding-bottom: 2px;
        }

        .back-btn:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>

    <!-- Visual Background Effect Layer -->
    <div class="background-effect"></div>

    <!-- Main Content Card -->
    <div class="container">
        <!-- Required State Text (Bold & Size 25) -->
        <div class="status-text">⚡ Will be in soon ⚡</div>

        <!-- Countdown Display Grid -->
        <div class="countdown-grid">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days ⏳</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours 🪐</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins 🛸</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs ⚡</span>
            </div>
        </div>

        <!-- Back link to homepage -->
        <a href="index.html" class="back-btn">← Go Back to Home</a>
    </div>

    <!-- Countdown Timer Logic Script -->
    <script>
        // STORAGE PERSISTENCE ENGINE: Keeps target sync locked during refresh routines
        function initializeTargetTimeline() {
            let existingTarget = localStorage.getItem('persistent_launch_stamp');
            
            if (!existingTarget) {
                // Calculate exactly 95 days into future coordinates from first visit initialization
                const timelineOffset = 95 * 24 * 60 * 60 * 1000;
                const freshTargetStamp = new Date().getTime() + timelineOffset;
                localStorage.setItem('persistent_launch_stamp', freshTargetStamp);
                return freshTargetStamp;
            }
            return parseInt(existingTarget, 10);
        }

        const targetDate = initializeTargetTimeline();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                clearInterval(timerInterval);
                document.querySelector(".countdown-grid").innerHTML = "<h2 style='color:var(--neon-green); font-size: 2rem;'>SYSTEM ONLINE</h2>";
                return;
            }

            // Time math calculations
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Print numbers safely into the boxes, adding leading zeros if needed
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Run calculation instantly, then update it every 1 second
        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>





<audio id="bg-music" loop autoplay muted>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="audio-player-widget">
  <div class="visualizer-container playing" id="visualizer">
    <div class="glow-orb"></div>
    <div class="vfx-bars">
      <span class="bar3d"></span>
      <span class="bar3d"></span>
      <span class="bar3d"></span>
      <span class="bar3d"></span>
      <span class="bar3d"></span>
    </div>
  </div>
  
  <div class="control-node">
    <button id="mute-btn" onclick="toggleMute()">
      <span class="icon-layer">🔇</span>
    </button>
    
    <div class="slider-container">
      <div class="slider-track-wrap">
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
        <div class="slider-fill"></div>
      </div>
    </div>
  </div>
</div>

<style>
  :root {
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff007f;
    --panel-bg: rgba(10, 12, 18, 0.4);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  .audio-player-widget {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    padding: 10px 16px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 1000;
    
    transform: perspective(800px) rotateX(10deg) rotateY(-10deg);
    transform-style: preserve-3d;
    box-shadow: 
      -5px 5px 15px rgba(0, 0, 0, 0.4),
      0 0 40px rgba(0, 240, 255, 0.05),
      inset 0 1px 2px rgba(255, 255, 255, 0.2);
    transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .audio-player-widget:hover {
    background: rgba(15, 20, 30, 0.6);
    transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateY(-5px);
    box-shadow: 
      0 15px 35px rgba(0, 0, 0, 0.5),
      0 0 30px rgba(0, 240, 255, 0.15),
      inset 0 1px 2px rgba(255, 255, 255, 0.3);
  }

  .visualizer-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    transform: translateZ(15px);
    overflow: hidden;
  }

  .glow-orb {
    position: absolute;
    width: 120%;
    height: 120%;
    background: radial-gradient(circle, rgba(0,240,255,0.2) 0%, rgba(255,0,127,0) 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
    mix-blend-mode: screen;
  }

  .visualizer-container.playing .glow-orb {
    opacity: 1;
    animation: pulseGlow 3s infinite alternate;
  }

  .vfx-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 20px;
    z-index: 2;
  }

  .bar3d {
    width: 3px;
    height: 30%;
    background: linear-gradient(to top, var(--neon-magenta), var(--neon-cyan));
    border-radius: 2px;
    transform-origin: bottom;
    box-shadow: 0 0 8px var(--neon-cyan);
    transition: height 0.15s ease;
  }

  .visualizer-container.playing .bar3d {
    animation: vfxBounce 0.6s ease-in-out infinite alternate;
  }
  .visualizer-container.playing .bar3d:nth-child(1) { animation-delay: 0.1s; height: 75%; }
  .visualizer-container.playing .bar3d:nth-child(2) { animation-delay: 0.35s; height: 90%; }
  .visualizer-container.playing .bar3d:nth-child(3) { animation-delay: 0.2s; height: 60%; }
  .visualizer-container.playing .bar3d:nth-child(4) { animation-delay: 0.5s; height: 100%; }
  .visualizer-container.playing .bar3d:nth-child(5) { animation-delay: 0.15s; height: 40%; }

  .control-node {
    display: flex;
    align-items: center;
    gap: 8px;
    transform: translateZ(10px);
  }

  #mute-btn {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    cursor: pointer;
    font-size: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: #fff;
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #mute-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
    transform: scale(1.08);
  }

  #mute-btn:active {
    transform: scale(0.92);
  }

  .slider-container {
    display: flex;
    align-items: center;
    width: 0;
    overflow: hidden;
    transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .audio-player-widget:hover .slider-container {
    width: 90px;
  }

  .slider-track-wrap {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
    padding-left: 6px;
  }

  #volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.1);
    outline: none;
    cursor: pointer;
    z-index: 2;
  }

  #volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 
      0 0 10px var(--neon-cyan),
      0 0 4px rgba(0,0,0,0.8);
    cursor: pointer;
    transition: transform 0.2s ease, background-color 0.2s;
  }

  #volume-slider::-webkit-slider-thumb:hover {
    transform: scale(1.4);
    background: var(--neon-cyan);
  }

  @keyframes vfxBounce {
    0% { transform: scaleY(0.25); filter: hue-rotate(0deg); }
    100% { transform: scaleY(1.1); filter: hue-rotate(45deg); }
  }

  @keyframes pulseGlow {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.3) rotate(180deg); }
  }
</style>

<script>
  const music = document.getElementById('bg-music');
  const muteBtn = document.getElementById('mute-btn');
  const slider = document.getElementById('volume-slider');
  const visualizer = document.getElementById('visualizer');

  // Parse cached settings
  const savedVolume = localStorage.getItem('bg-volume');
  if (savedVolume !== null) {
    music.volume = parseFloat(savedVolume);
    slider.value = savedVolume;
  } else {
    music.volume = 0.5;
  }

  // First page setup: start playing immediately in the background
  window.addEventListener('DOMContentLoaded', () => {
    music.play()
      .then(() => {
        visualizer.classList.add('playing');
      })
      .catch(() => {
        console.log("Autoplay waiting for fallback click context.");
      });
  });

  // Dynamic Unmute trigger on user's absolute first touch/click anywhere on screen
  document.addEventListener('click', () => {
    const savedMuteStatus = localStorage.getItem('bg-muted');
    if (savedMuteStatus !== 'true' && music.muted) {
      music.muted = false;
      muteBtn.innerHTML = music.volume == 0 ? "🔇" : "🔊";
      music.play().catch(() => {});
    }
  }, { once: true });

  function toggleMute() {
    if (music.muted) {
      music.muted = false;
      muteBtn.innerHTML = music.volume == 0 ? "🔇" : "🔊";
      visualizer.classList.add('playing');
      localStorage.setItem('bg-muted', 'false');
      music.play().catch(() => {});
    } else {
      music.muted = true;
      muteBtn.innerHTML = "🔇";
      visualizer.classList.remove('playing');
      localStorage.setItem('bg-muted', 'true');
    }
  }

  function changeVolume(volumeValue) {
    const numericVolume = parseFloat(volumeValue);
    music.volume = numericVolume;
    localStorage.setItem('bg-volume', volumeValue);

    if (numericVolume === 0) {
      music.muted = true;
      muteBtn.innerHTML = "🔇";
      visualizer.classList.remove('playing');
    } else {
      music.muted = false;
      muteBtn.innerHTML = "🔊";
      visualizer.classList.add('playing');
      music.play().catch(() => {});
    }
  }
</script>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn With Me - Coming Soon</title>
    <style>
        /* Modern Dark Theme Base */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Moving Particle/Star Background Effect */
        .background-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            animation: moveBackground 60s linear infinite;
            opacity: 0.3;
            z-index: 1;
        }

        @keyframes moveBackground {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: 550px 1100px, 400px 760px; }
        }

        /* Glassmorphism Container Card */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 60px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
            max-width: 600px;
            width: 90%;
        }

        /* Required Title: Bold, 25px, with subtle text-glow */
        .status-text {
            font-size: 25px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #ff4b2b;
            text-shadow: 0 0 15px rgba(255, 75, 43, 0.6);
        }

        /* Unique Countdown Grid */
        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 16px;
            min-width: 80px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .time-box span {
            display: block;
        }

        .number {
            font-size: 36px;
            font-weight: 800;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
            font-variant-numeric: tabular-nums;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #8a8a9e;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Back Button Style */
        .back-btn {
            display: inline-block;
            color: #8a8a9e;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            border-bottom: 1px dashed rgba(138, 138, 158, 0.4);
            padding-bottom: 2px;
        }

        .back-btn:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Visual Background Effect Layer -->
    <div class="background-effect"></div>

    <!-- Main Content Card -->
    <div class="container">
        <!-- Required State Text (Bold & Size 25) -->
        <div class="status-text">Will be in soon</div>

        <!-- Countdown Display Grid -->
        <div class="countdown-grid">
            <div class="time-box">
                <span class="number" id="days">95</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>

        <!-- Back link to homepage -->
        <a href="index.html" class="back-btn">← Go Back to Home</a>
    </div>

    <!-- Countdown Timer Logic Script -->
    <script>
        // Set exact countdown duration: 95 Days from right now
        const countdownDurationImg = 95 * 24 * 60 * 60 * 1000; 
        const targetDate = new Date().getTime() + countdownDurationImg;

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Time math calculations
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Print numbers safely into the boxes, adding leading zeros if needed
            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // Switch to a "Launch" text once the countdown hits zero
            if (difference < 0) {
                clearInterval(timerInterval);
                document.querySelector(".countdown-grid").innerHTML = "<h2 style='color:#00f2fe;'>We Are Live!</h2>";
            }
        }

        // Run calculation instantly, then update it every 1 second
        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
